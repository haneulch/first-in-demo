services:
  app:
    build:
      context: ../../..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/firstin
      SPRING_DATASOURCE_USERNAME: firstin
      SPRING_DATASOURCE_PASSWORD: firstin
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: firstin
      POSTGRES_USER: firstin
      POSTGRES_PASSWORD: firstin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firstin"]
      interval: 5s
      timeout: 3s
      retries: 10