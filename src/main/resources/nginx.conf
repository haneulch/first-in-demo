# 로드밸런서 설정 — app 레플리카들에 라운드로빈 분산
# "app" DNS가 여러 IP로 풀리면 nginx가 전부 upstream 피어로 등록한다.
# 주의: 해석은 기동 시점 1회 — 스케일 변경 후에는 lb 재시작 필요 (docker compose restart lb)
worker_processes auto;

events {
  worker_connections 8192;
}

http {
  access_log off;

  upstream firstin {
    server app:8080;
    keepalive 64;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://firstin;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }
  }
}
